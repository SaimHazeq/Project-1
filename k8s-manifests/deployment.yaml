apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-app
  template:
    metadata:
      labels:
        app: devops-app
    spec:
      containers:
      - name: app
        image: 047719648578.dkr.ecr.ap-south-1.amazonaws.com/devops-project-repo:latest
        ports:
        - containerPort: 5000
